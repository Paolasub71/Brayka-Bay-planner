<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brayka Bay — Nav Sub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460;
  --accent:#1D9E75; --warn:#EF9F27; --danger:#e24b4a; --blue:#378ADD;
  --text:#eee; --text2:#aaa; --text3:#555;
  --card:rgba(22,33,62,0.97);
}
.day { --bg:#f0f0f0; --bg2:#fff; --bg3:#ccc; --text:#222; --text2:#555; --text3:#999; --card:rgba(255,255,255,0.97); }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* TOOLBAR — compatta, tutto su una riga */
#toolbar {
  display:flex; gap:4px; padding:5px 8px;
  background:var(--bg2); align-items:center;
  border-bottom:1px solid var(--bg3); flex-shrink:0;
  flex-wrap:nowrap; overflow-x:auto;
}
#toolbar h1 { font-size:12px; font-weight:700; color:var(--accent); white-space:nowrap; margin-right:4px; flex-shrink:0; }
.btn {
  font-size:11px; padding:5px 9px; border-radius:16px;
  border:1px solid var(--bg3); background:var(--bg);
  color:var(--text2); cursor:pointer; white-space:nowrap;
  min-height:30px; display:flex; align-items:center; gap:3px; flex-shrink:0;
}
.btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.warn { border-color:var(--warn); color:var(--warn); }
.btn.warn.active { background:var(--warn); color:#fff; }
.btn.danger { border-color:var(--danger); color:var(--danger); }
.btn.blue { border-color:var(--blue); color:var(--blue); }
.btn.blue.active { background:var(--blue); color:#fff; }
.sep { width:1px; background:var(--bg3); height:20px; flex-shrink:0; margin:0 2px; }

/* MAP */
#map { flex:1; min-height:0; }

/* BOTTOM BAR */
#bottombar { background:var(--bg2); border-top:1px solid var(--bg3); flex-shrink:0; }
#inforow { display:flex; gap:10px; padding:5px 10px; align-items:center; min-height:32px; flex-wrap:wrap; }
.info-chip { font-size:11px; color:var(--text2); }
.info-chip b { color:var(--text); font-size:12px; }
#bearing-big { font-size:18px; font-weight:700; color:var(--accent); }

/* PANELS — bottom sheet su mobile */
.panel {
  position:absolute; z-index:1002;
  background:var(--card);
  border:1px solid var(--bg3);
  border-radius:12px 12px 0 0;
  padding:14px 14px 20px;
  left:0; right:0; bottom:32px;
  max-height:55dvh; overflow-y:auto;
  display:none;
  box-shadow:0 -4px 20px rgba(0,0,0,0.4);
}
.panel h3 {
  font-size:14px; font-weight:700; color:var(--accent);
  margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;
}
.panel-close {
  cursor:pointer; color:var(--text2); font-size:22px; line-height:1;
  padding:0 4px; min-width:32px; text-align:center;
}

/* WP LIST */
.wp-row { font-size:12px; color:var(--text2); padding:8px 0; border-bottom:1px solid var(--bg3); display:flex; justify-content:space-between; align-items:center; gap:8px; }
.wp-row:last-child { border:none; }
.wp-bearing { color:var(--warn); font-weight:700; font-size:13px; }
.wp-del { color:var(--danger); cursor:pointer; font-size:22px; padding:0 6px; min-width:34px; text-align:center; }

/* WEATHER */
.weather-semaforo { display:flex; align-items:center; gap:10px; padding:10px; border-radius:8px; margin-bottom:10px; }
.semaforo-dot { width:40px; height:40px; border-radius:50%; flex-shrink:0; }
.weather-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.w-card { background:var(--bg2); border-radius:8px; padding:8px; text-align:center; }
.w-val { font-size:20px; font-weight:700; color:var(--text); }
.w-lbl { font-size:10px; color:var(--text2); margin-top:2px; }
.w-day { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--bg3); font-size:12px; }
.w-day:last-child { border:none; }

/* ZONES */
.zone-row { display:flex; align-items:center; padding:7px 0; border-bottom:1px solid var(--bg3); font-size:13px; gap:8px; }
.zone-row:last-child { border:none; }
.zone-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.zone-name { flex:1; color:var(--text); }
.zone-del { color:var(--danger); cursor:pointer; font-size:20px; padding:0 4px; }
.toggle { width:44px; height:24px; border-radius:12px; border:none; cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; }
.toggle.on { background:var(--accent); }
.toggle.off { background:var(--bg3); }
.toggle::after { content:''; position:absolute; top:4px; width:16px; height:16px; border-radius:50%; background:white; transition:left 0.2s; }
.toggle.on::after { left:24px; }
.toggle.off::after { left:4px; }

/* NIGHT BTN */
#night-btn { position:absolute; bottom:40px; left:8px; z-index:1001; }

/* HINT */
#hint { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); z-index:1000; background:rgba(0,0,0,0.72); color:#fff; font-size:11px; padding:4px 14px; border-radius:20px; pointer-events:none; white-space:nowrap; max-width:88vw; text-align:center; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>⚓ Brayka</h1>
  <div class="sep"></div>
  <button class="btn active" id="btn-exit" onclick="setMode('exit')">🔴 Exit</button>
  <button class="btn warn" id="btn-drop" onclick="setMode('drop')">🟠 Drop</button>
  <button class="btn" id="btn-wp" onclick="setMode('wp')">🔵 WP</button>
  <button class="btn" id="btn-nav" onclick="setMode('nav')">🧭 Rotta</button>
  <button class="btn blue" id="btn-zone" onclick="setMode('zone')">📌 Zona</button>
  <div class="sep"></div>
  <button class="btn" onclick="togglePanel('wp-panel')">📋 Percorso</button>
  <button class="btn warn" onclick="togglePanel('weather-panel'); loadWeather()">🌤 Meteo</button>
  <button class="btn" onclick="togglePanel('zones-panel')">📍 Zone</button>
  <button class="btn danger" onclick="clearAll()">✕</button>
  <button class="btn" onclick="toggleNight()" id="night-label">🌙</button>
</div>

<div id="map"></div>

<div id="hint">Clicca sulla mappa per impostare l'exit point</div>

<div id="bottombar">
  <div id="inforow">
    <span class="info-chip">Modo: <b id="mode-lbl">Exit</b></span>
    <span class="info-chip" id="bi" style="display:none"><span id="bearing-big"></span></span>
    <span class="info-chip" id="di" style="display:none">📏 <b id="dist-val"></b></span>
    <span class="info-chip" id="ci" style="font-size:10px">📍 <b id="coord-val">—</b></span>
  </div>
</div>

<!-- PANELS — bottom sheet -->
<div class="panel" id="wp-panel">
  <h3>Percorso immersione <span class="panel-close" onclick="closePanel('wp-panel')">×</span></h3>
  <div id="wp-rows"></div>
  <div style="margin-top:12px;display:flex;gap:8px">
    <button class="btn" style="flex:1;justify-content:center" onclick="exportPDF()">📄 Export PDF</button>
    <button class="btn danger" style="flex:1;justify-content:center" onclick="clearRoute()">🗑 Pulisci</button>
  </div>
</div>

<div class="panel" id="weather-panel">
  <h3>Meteo Brayka Bay <span class="panel-close" onclick="closePanel('weather-panel')">×</span></h3>
  <div id="weather-content"><p style="color:var(--text2);font-size:13px">Caricamento previsioni...</p></div>
</div>

<div class="panel" id="zones-panel">
  <h3>Zone fisse <span class="panel-close" onclick="closePanel('zones-panel')">×</span></h3>
  <div id="zone-rows"><p style="font-size:13px;color:var(--text2)">Nessuna zona. Usa 📌 Zona per aggiungerne.</p></div>
  <button class="btn blue" style="margin-top:10px;width:100%;justify-content:center" onclick="setMode('zone');closePanel('zones-panel')">+ Aggiungi zona</button>
</div>

<script>
const map = L.map('map',{zoomControl:false}).setView([25.2155,34.7995],18);
L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,attribution:'© Google'}).addTo(map);
L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',{maxZoom:21,opacity:0.8}).addTo(map);

let mode='exit';
let exitMarker=null, dropMarker=null, navClickMarker=null, navLine=null;
let waypoints=[], wpMarkers=[], wpLines=[];
let zones=[];
let nightMode=false;
let weatherLoaded=false;

const hints={
  exit:'Clicca per impostare exit point (uscita dall\'acqua)',
  drop:'Clicca per impostare drop point (tuffo dal gommone)',
  wp:'Clicca per aggiungere waypoint consecutivi',
  nav:'Clicca un punto — calcola bearing e distanza verso exit',
  zone:'Clicca per aggiungere una zona fissa con nome'
};

function setMode(m){
  mode=m;
  const labels={exit:'Exit',drop:'Drop',wp:'Waypoint',nav:'Rotta',zone:'Zona'};
  document.getElementById('mode-lbl').textContent=labels[m];
  document.getElementById('hint').textContent=hints[m];
  ['exit','drop','wp','nav','zone'].forEach(id=>{
    const b=document.getElementById('btn-'+id); if(!b) return;
    let cls='btn';
    if(id==='drop') cls+=' warn';
    if(id==='zone') cls+=' blue';
    if(id===m) cls+=' active';
    b.className=cls;
  });
  document.getElementById('bi').style.display='none';
  document.getElementById('di').style.display='none';
}

function bearing(from,to){
  const r=x=>x*Math.PI/180,dLon=r(to.lng-from.lng);
  const la1=r(from.lat),la2=r(to.lat);
  const y=Math.sin(dLon)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return ((Math.atan2(y,x)*180/Math.PI)%360+360)%360;
}
function distM(a,b){ return Math.round(a.distanceTo(b)); }
function distStr(m){ return m<1000?m+'m':(m/1000).toFixed(2)+'km'; }
function compassDir(d){ return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'][Math.round(d/22.5)%16]; }

function mkIcon(label,color,size,fs='11px'){
  return L.divIcon({className:'',
    html:`<div style="width:${size}px;height:${size}px;background:${color};border:2.5px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${fs};font-weight:700;color:white;box-shadow:0 2px 6px rgba(0,0,0,0.5)">${label}</div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2]});
}
const exitIcon=mkIcon('X','#e24b4a',28);
const dropIcon=mkIcon('D','#EF9F27',28);
const navIcon=mkIcon('','#378ADD',16);
function wpIcon(n){ return mkIcon(n,'#378ADD',24); }
function zoneIcon(color){ return mkIcon('●',color,22,'14px'); }

map.on('click',function(e){
  const ll=e.latlng;
  document.getElementById('coord-val').textContent=ll.lat.toFixed(5)+'°N '+ll.lng.toFixed(5)+'°E';

  if(mode==='exit'){
    if(exitMarker) map.removeLayer(exitMarker);
    exitMarker=L.marker(ll,{icon:exitIcon,draggable:true}).addTo(map);
    exitMarker.bindTooltip('<b>EXIT</b>',{permanent:true,direction:'top',offset:[0,-16]});
    exitMarker.on('drag dragend',refreshAll);
    refreshAll();

  } else if(mode==='drop'){
    if(dropMarker) map.removeLayer(dropMarker);
    dropMarker=L.marker(ll,{icon:dropIcon,draggable:true}).addTo(map);
    dropMarker.bindTooltip('<b>DROP</b>',{permanent:true,direction:'top',offset:[0,-16]});
    dropMarker.on('drag dragend',refreshAll);
    refreshAll();

  } else if(mode==='wp'){
    const n=waypoints.length+1;
    const m=L.marker(ll,{icon:wpIcon(n),draggable:true}).addTo(map);
    m.bindTooltip('<b>WP'+n+'</b>',{permanent:true,direction:'top',offset:[0,-14]});
    m.on('drag dragend',refreshAll);
    waypoints.push(ll);
    wpMarkers.push(m);
    refreshAll();

  } else if(mode==='nav'){
    if(!exitMarker){ showHint('Prima imposta un exit point!'); return; }
    if(navClickMarker) map.removeLayer(navClickMarker);
    if(navLine) map.removeLayer(navLine);
    navClickMarker=L.marker(ll,{icon:navIcon}).addTo(map);
    const eLL=exitMarker.getLatLng();
    const b=bearing(ll,eLL), d=distM(ll,eLL);
    navLine=L.polyline([ll,eLL],{color:'#378ADD',weight:3,dashArray:'10,6',opacity:0.9}).addTo(map);
    navLine.bindTooltip(`${Math.round(b)}° ${compassDir(b)} — ${distStr(d)}`,{permanent:true,direction:'center'});
    document.getElementById('bearing-big').textContent=Math.round(b)+'° '+compassDir(b);
    document.getElementById('bi').style.display='';
    document.getElementById('dist-val').textContent=distStr(d);
    document.getElementById('di').style.display='';

  } else if(mode==='zone'){
    const name=prompt('Nome zona (es. Reef Nord, Drop-off, Entrata):');
    if(!name) return;
    const colors=['#1D9E75','#e24b4a','#EF9F27','#378ADD','#a855f7','#ec4899'];
    const color=colors[zones.length%colors.length];
    const zm=L.marker(ll,{icon:zoneIcon(color),draggable:true}).addTo(map);
    zm.bindTooltip('<b>'+name+'</b>',{permanent:true,direction:'top',offset:[0,-14]});
    zones.push({name,color,marker:zm,visible:true});
    refreshZoneList();
  }
});

function refreshAll(){
  wpLines.forEach(l=>map.removeLayer(l));
  wpLines=[];
  const seq=[];
  if(dropMarker) seq.push({ll:dropMarker.getLatLng(),label:'DROP'});
  wpMarkers.forEach((m,i)=>seq.push({ll:m.getLatLng(),label:'WP'+(i+1)}));
  if(exitMarker) seq.push({ll:exitMarker.getLatLng(),label:'EXIT'});
  for(let i=0;i<seq.length-1;i++){
    const from=seq[i],to=seq[i+1];
    const b=Math.round(bearing(from.ll,to.ll));
    const ret=Math.round((b+180)%360);
    const d=distStr(distM(from.ll,to.ll));
    const color=to.label==='EXIT'?'#e24b4a':'#378ADD';
    const line=L.polyline([from.ll,to.ll],{color,weight:2.5,dashArray:'8,5',opacity:0.9}).addTo(map);
    line.bindTooltip(`${from.label}→${to.label}: ${b}° ${compassDir(b)} | rit.${ret}° | ${d}`,{direction:'center',sticky:true});
    wpLines.push(line);
  }
  refreshWPList();
}

function refreshWPList(){
  const rows=document.getElementById('wp-rows');
  const seq=[];
  if(dropMarker) seq.push({ll:dropMarker.getLatLng(),label:'DROP'});
  wpMarkers.forEach((m,i)=>seq.push({ll:m.getLatLng(),label:'WP'+(i+1),idx:i}));
  if(exitMarker) seq.push({ll:exitMarker.getLatLng(),label:'EXIT'});
  if(seq.length<2){ rows.innerHTML='<p style="font-size:13px;color:var(--text2);padding:8px 0">Aggiungi drop, waypoint o exit per vedere la rotta.</p>'; return; }
  let html='';
  for(let i=0;i<seq.length-1;i++){
    const from=seq[i],to=seq[i+1];
    const b=Math.round(bearing(from.ll,to.ll));
    const ret=Math.round((b+180)%360);
    const d=distStr(distM(from.ll,to.ll));
    const del=(to.idx!==undefined)?`<span class="wp-del" onclick="deleteWP(${to.idx})">✕</span>`:'';
    html+=`<div class="wp-row">
      <span style="color:var(--text);font-weight:500">${from.label} → ${to.label}</span>
      <span style="text-align:right"><span class="wp-bearing">${b}° ${compassDir(b)}</span><br>
      <span style="color:var(--text3);font-size:10px">rit. ${ret}° &nbsp; ${d}</span></span>
      ${del}
    </div>`;
  }
  rows.innerHTML=html;
}

function deleteWP(i){
  map.removeLayer(wpMarkers[i]);
  wpMarkers.splice(i,1);
  waypoints.splice(i,1);
  wpMarkers.forEach((m,j)=>{m.setIcon(wpIcon(j+1));m.setTooltipContent('<b>WP'+(j+1)+'</b>');});
  refreshAll();
}

function refreshZoneList(){
  const rows=document.getElementById('zone-rows');
  if(zones.length===0){ rows.innerHTML='<p style="font-size:13px;color:var(--text2)">Nessuna zona. Usa 📌 Zona per aggiungerne.</p>'; return; }
  let html='';
  zones.forEach((z,i)=>{
    html+=`<div class="zone-row">
      <div class="zone-dot" style="background:${z.color}"></div>
      <span class="zone-name">${z.name}</span>
      <button class="toggle ${z.visible?'on':'off'}" onclick="toggleZone(${i})"></button>
      <span class="zone-del" onclick="deleteZone(${i})">✕</span>
    </div>`;
  });
  rows.innerHTML=html;
}

function toggleZone(i){
  zones[i].visible=!zones[i].visible;
  if(zones[i].visible) map.addLayer(zones[i].marker);
  else map.removeLayer(zones[i].marker);
  refreshZoneList();
}

function deleteZone(i){
  map.removeLayer(zones[i].marker);
  zones.splice(i,1);
  refreshZoneList();
}

async function loadWeather(){
  if(weatherLoaded) return;
  const el=document.getElementById('weather-content');
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude=25.2155&longitude=34.7995&daily=windspeed_10m_max,winddirection_10m_dominant,windgusts_10m_max,temperature_2m_max&wind_speed_unit=kn&timezone=Africa%2FCairo&forecast_days=7';
    const r=await fetch(url);
    const d=await r.json();
    const wc=d.daily.windspeed_10m_max[1];
    const wg=d.daily.windgusts_10m_max[1]||wc;
    const wd=d.daily.winddirection_10m_dominant[1];
    let sc,sl,sd;
    if(wc<=12){ sc='#1D9E75'; sl='🟢 VERDE — OK offshore'; sd='Vento leggero. Gommone OK. Elphinstone navigabile.'; }
    else if(wc<=20){ sc='#EF9F27'; sl='🟡 GIALLO — Valuta bene'; sd='Vento moderato. Offshore con cautela. Attenzione mal di mare.'; }
    else { sc='#e24b4a'; sl='🔴 ROSSO — Shore dive'; sd='Vento forte. Resta in baia sulla house reef.'; }
    let html=`<div class="weather-semaforo" style="background:${sc}22;border:1px solid ${sc}55">
      <div class="semaforo-dot" style="background:${sc}"></div>
      <div><div style="font-weight:700;font-size:14px;color:${sc}">${sl}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">${sd}</div></div>
    </div>
    <div class="weather-grid">
      <div class="w-card"><div class="w-val">${Math.round(wc)}<span style="font-size:12px">kn</span></div><div class="w-lbl">💨 Vento max</div></div>
      <div class="w-card"><div class="w-val">${Math.round(wg)}<span style="font-size:12px">kn</span></div><div class="w-lbl">💨 Raffiche</div></div>
      <div class="w-card"><div class="w-val">${compassDir(wd)}</div><div class="w-lbl">🧭 Direzione</div></div>
      <div class="w-card"><div class="w-val">${Math.round(d.daily.temperature_2m_max[1])}<span style="font-size:12px">°C</span></div><div class="w-lbl">🌡 Aria</div></div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;font-style:italic">⚠ Onde: dati non disponibili per il Mar Rosso — semaforo su vento</div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">PROSSIMI 7 GIORNI</div>`;
    const days=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
    d.daily.windspeed_10m_max.forEach((w,i)=>{
      if(i===0) return;
      const wgi=d.daily.windgusts_10m_max[i]||w;
      const date=new Date(d.daily.time[i]);
      const dot=w<=12?'🟢':w<=20?'🟡':'🔴';
      html+=`<div class="w-day"><span>${dot} ${days[date.getDay()]} ${date.getDate()}/${date.getMonth()+1}</span><span style="color:var(--text)">${Math.round(w)}kn / raff.${Math.round(wgi)}kn</span></div>`;
    });
    el.innerHTML=html;
    weatherLoaded=true;
  } catch(err){
    el.innerHTML='<p style="color:var(--danger);font-size:13px">Errore caricamento. Verifica connessione.</p>';
  }
}

const allPanels=['wp-panel','weather-panel','zones-panel'];
function togglePanel(id){
  const panel=document.getElementById(id);
  const wasOpen=panel.style.display==='block';
  allPanels.forEach(p=>document.getElementById(p).style.display='none');
  if(!wasOpen){ panel.style.display='block'; if(id==='wp-panel') refreshWPList(); if(id==='zones-panel') refreshZoneList(); }
}
function closePanel(id){ document.getElementById(id).style.display='none'; }

function toggleNight(){
  nightMode=!nightMode;
  document.body.classList.toggle('day',!nightMode);
  document.getElementById('night-label').textContent=nightMode?'☀️':'🌙';
}

function showHint(msg){ const h=document.getElementById('hint'); h.textContent=msg; setTimeout(()=>h.textContent=hints[mode],2500); }

function clearAll(){
  if(!confirm('Cancellare tutto?')) return;
  [exitMarker,dropMarker,navClickMarker,navLine].forEach(x=>{if(x)map.removeLayer(x);});
  exitMarker=dropMarker=navClickMarker=navLine=null;
  wpMarkers.forEach(m=>map.removeLayer(m));
  wpLines.forEach(l=>map.removeLayer(l));
  waypoints=[];wpMarkers=[];wpLines=[];
  document.getElementById('bi').style.display='none';
  document.getElementById('di').style.display='none';
  document.getElementById('coord-val').textContent='—';
  allPanels.forEach(p=>document.getElementById(p).style.display='none');
}

function clearRoute(){
  [exitMarker,dropMarker,navClickMarker,navLine].forEach(x=>{if(x)map.removeLayer(x);});
  exitMarker=dropMarker=navClickMarker=navLine=null;
  wpMarkers.forEach(m=>map.removeLayer(m));
  wpLines.forEach(l=>map.removeLayer(l));
  waypoints=[];wpMarkers=[];wpLines=[];
  refreshAll();
  closePanel('wp-panel');
}

function exportPDF(){
  const seq=[];
  if(dropMarker) seq.push({ll:dropMarker.getLatLng(),label:'DROP'});
  wpMarkers.forEach((m,i)=>seq.push({ll:m.getLatLng(),label:'WP'+(i+1)}));
  if(exitMarker) seq.push({ll:exitMarker.getLatLng(),label:'EXIT'});
  if(seq.length<2){ alert('Aggiungi almeno drop/exit e un waypoint.'); return; }
  let rows='';
  for(let i=0;i<seq.length-1;i++){
    const from=seq[i],to=seq[i+1];
    const b=Math.round(bearing(from.ll,to.ll));
    const ret=Math.round((b+180)%360);
    const d=distStr(distM(from.ll,to.ll));
    rows+=`<tr><td>${from.label}</td><td>${to.label}</td><td><b>${b}° ${compassDir(b)}</b></td><td>${ret}°</td><td>${d}</td><td style="font-size:11px">${from.ll.lat.toFixed(5)}°N<br>${from.ll.lng.toFixed(5)}°E</td></tr>`;
  }
  const last=seq[seq.length-1];
  rows+=`<tr style="background:#f0fff8"><td colspan="5"><b>EXIT</b></td><td style="font-size:11px">${last.ll.lat.toFixed(5)}°N<br>${last.ll.lng.toFixed(5)}°E</td></tr>`;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Piano Immersione — Brayka Bay</title>
  <style>*{box-sizing:border-box}body{font-family:system-ui;padding:20px;max-width:680px;margin:0 auto;color:#222}
  h1{font-size:18px;color:#1D9E75;margin-bottom:2px}h2{font-size:12px;color:#888;font-weight:400;margin-bottom:16px}
  .meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;padding:10px;background:#f5f5f5;border-radius:8px;font-size:12px}
  table{width:100%;border-collapse:collapse}th{background:#1D9E75;color:white;padding:8px;text-align:left;font-size:12px}
  td{padding:8px;border-bottom:1px solid #eee;font-size:12px}tr:nth-child(even){background:#fafafa}
  .warn{background:#fff8e1;border-left:4px solid #EF9F27;padding:10px 12px;margin-top:14px;font-size:11px;border-radius:4px}
  @media print{.noprint{display:none}}</style></head><body>
  <h1>⚓ Piano Immersione — Brayka Bay</h1>
  <h2>${new Date().toLocaleDateString('it-IT')} ore ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</h2>
  <div class="meta"><span>📍 Brayka Bay, Marsa Alam</span><span>🗓 Data: ___/___/______</span><span>👤 Buddy: ____________</span></div>
  <table><thead><tr><th>Da</th><th>A</th><th>Bearing</th><th>Ritorno</th><th>Distanza</th><th>Coord. partenza</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="warn">⚠️ Dati indicativi. Verifica corrente e visibilità in loco. Declinazione magnetica locale ~2°E. Porta sempre i dive computer.</div>
  <button class="noprint" onclick="window.print()" style="margin-top:14px;padding:10px 22px;background:#1D9E75;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">🖨 Stampa / Salva PDF</button>
  </body></html>`);
  win.document.close();
}
</script>
